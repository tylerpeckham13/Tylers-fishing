<!DOCTYPE html>
<html>
<head>
  <title>Guess the Fish</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f5f7fa;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #0d3b66;
    }

    img {
      width: 300px;
      border-radius: 10px;
      margin-top: 20px;
    }

    input {
      padding: 10px;
      margin-top: 15px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      background-color: #0d3b66;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 10px;
      cursor: pointer;
    }

    #result {
      font-weight: bold;
      margin-top: 15px;
    }

    #score {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🎣 Guess the Fish</h1>
<p>Type the name of the fish shown below:</p>

<img id="fishImage" src="" alt="Fish Image">

<br>

<input id="guess" placeholder="Enter fish name">

<br>

<button onclick="checkAnswer()">Submit</button>
<button onclick="nextFish()">Next Fish</button>

<p id="result"></p>
<p id="score">Score: 0</p>

<script>

// ✅ RELIABLE IMAGE LINKS (WILL WORK)
let fish = [
  {
    name: "bass",
    img: "https://upload.wikimedia.org/wikipedia/commons/0/0c/Largemouth_bass.jpg"
  },
  {
    name: "trout",
    img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/Salmo_trutta.jpg"
  },
  {
    name: "catfish",
    img: "https://upload.wikimedia.org/wikipedia/commons/a/a3/Channel_catfish.jpg"
  }
];

let current = 0;
let score = 0;

// Load first fish
function loadFish() {
  document.getElementById("fishImage").src = fish[current].img;
  document.getElementById("result").innerText = "";
  document.getElementById("guess").value = "";
}

// Check answer
function checkAnswer() {
  let guess = document.getElementById("guess").value.trim().toLowerCase();

  if (guess === fish[current].name) {
    document.getElementById("result").innerText = "✅ Correct!";
    score++;
  } else {
    document.getElementById("result").innerText = "❌ Try again!";
  }

  document.getElementById("score").innerText = "Score: " + score;
}

// Next fish
function nextFish() {
  current++;

  if (current >= fish.length) {
    document.getElementById("result").innerText = "🎉 Game Over!";
    document.getElementById("fishImage").style.display = "none";
    return;
  }

  loadFish();
}

// Start game
loadFish();

</script>

</body>
</html>
